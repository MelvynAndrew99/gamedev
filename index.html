<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Destruction Racer</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #000;
        font-family: Arial, sans-serif;
        display: flex;
        height: 100vh;
        overflow: hidden;
      }
      #debug-panel {
        background: rgba(0, 0, 0, 0.9);
        border-right: 2px solid #00e5ff;
        padding: 20px;
        width: 250px;
        overflow-y: auto;
        color: #00e5ff;
        font-size: 12px;
      }
      #debug-panel h2 { font-size: 16px; margin-bottom: 15px; text-decoration: underline; }
      .debug-control { margin-bottom: 20px; }
      .debug-control label { display: block; margin-bottom: 5px; font-weight: bold; }
      .debug-control input[type="range"] { width: 100%; cursor: pointer; }
      .debug-control .value {
        display: inline-block; background: #00e5ff; color: #000;
        padding: 2px 6px; margin-top: 5px; font-weight: bold; border-radius: 3px;
      }
      #game-container {
        flex: 1; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
      }
      #game { background: #000; }
      .controls { margin-top: 20px; color: #fff; text-align: center; }
      .controls h2 { margin: 0 0 10px 0; }
      .controls p { margin: 5px 0; }
    </style>
  </head>
  <body>
    <div id="debug-panel">
      <h2>🛠 Projection Lab</h2>

      <div class="debug-control">
        <label for="maxSpeed">Max Speed</label>
        <input type="range" id="maxSpeed" min="3000" max="24000" value="12000" step="500" />
        <div class="value" id="maxSpeedValue">12000</div>
      </div>

      <div style="margin: 25px 0 15px 0; padding-top: 15px; border-top: 1px solid #00e5ff;">
        <strong>HANDLING</strong>
      </div>

      <div class="debug-control">
        <label for="steerRate">Steer Rate</label>
        <input type="range" id="steerRate" min="0.5" max="4" value="2" step="0.1" />
        <div class="value" id="steerRateValue">2</div>
      </div>

      <div class="debug-control">
        <label for="centrifugal">Centrifugal Pull</label>
        <input type="range" id="centrifugal" min="0" max="1" value="0.3" step="0.05" />
        <div class="value" id="centrifugalValue">0.3</div>
      </div>

      <div class="debug-control">
        <label for="airbrakeForce">Airbrake Force</label>
        <input type="range" id="airbrakeForce" min="0" max="5" value="2.2" step="0.1" />
        <div class="value" id="airbrakeForceValue">2.2</div>
      </div>

      <div class="debug-control">
        <label for="steerExpo">Stick Expo Curve</label>
        <input type="range" id="steerExpo" min="1" max="3" value="1.6" step="0.1" />
        <div class="value" id="steerExpoValue">1.6</div>
      </div>

      <div style="margin: 25px 0 15px 0; padding-top: 15px; border-top: 1px solid #00e5ff;">
        <strong>CAMERA</strong>
      </div>

      <div class="debug-control">
        <label for="fov">Field of View</label>
        <input type="range" id="fov" min="60" max="140" value="100" step="1" />
        <div class="value" id="fovValue">100</div>
      </div>

      <div class="debug-control">
        <label for="cameraHeight">Camera Height</label>
        <input type="range" id="cameraHeight" min="300" max="3000" value="1000" step="50" />
        <div class="value" id="cameraHeightValue">1000</div>
      </div>

      <div class="debug-control">
        <label for="drawDistance">Draw Distance</label>
        <input type="range" id="drawDistance" min="30" max="400" value="200" step="10" />
        <div class="value" id="drawDistanceValue">200</div>
      </div>

      <div class="debug-control">
        <label for="fogDensity">Fog Density</label>
        <input type="range" id="fogDensity" min="0" max="20" value="5" step="1" />
        <div class="value" id="fogDensityValue">5</div>
      </div>

      <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #00e5ff;">
        <p style="font-size: 11px; line-height: 1.6;">
          <strong>Status:</strong><br />
          FPS: <span id="fps">60</span>
        </p>
      </div>
    </div>

    <div id="game-container">
      <div id="game"></div>
      <div class="controls">
        <h2>Destruction Racer</h2>
        <p><strong>↑</strong> gas &nbsp; <strong>↓</strong> brake &nbsp; <strong>← →</strong> steer &nbsp; <strong>Z / X</strong> airbrakes</p>
        <p>🎮 stick steer &nbsp; R2 gas &nbsp; L2 brake &nbsp; <strong>L1 / R1 airbrakes</strong></p>
        <p>Cones warn. Rocks collect.</p>
      </div>
    </div>

    <script type="module" src="/src/game.js"></script>
  </body>
</html>
